<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DRAINER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }
        
        h1 {
            color: #0f0;
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .sub {
            text-align: center;
            color: #0f0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .address-box {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-size: 12px;
            color: #0f0;
            border: 1px solid #333;
        }
        
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0,255,0,0.5);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .log {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            height: 300px;
            overflow-y: auto;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> DRAINER</h1>
        <div class="sub">CONNECT & DRAIN</div>
        
        <div class="address-box">
            🎯 <span id="targetAddr">Loading...</span>
        </div>
        
        <button id="drainBtn">💀 CONNECT & DRAIN 💀</button>
        
        <div class="log" id="log"></div>
        
        <div class="footer">DEVNET - EDUCATIONAL</div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
