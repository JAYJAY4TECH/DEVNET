<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💀 DEVNET DRAINER 💀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .devnet-badge {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .address-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .drain-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            padding: 18px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            width: 100%;
            margin: 16px 0;
            transition: all 0.3s;
        }
        
        .drain-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }
        
        .drain-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .log-entry.success { color: #4ade80; }
        .log-entry.drain { color: #ef4444; }
        .log-entry.wait { color: #fbbf24; }
        .log-entry.error { color: #ef4444; }
        
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #64748b;
        }
        
        .warning {
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            padding: 10px;
            margin: 15px 0;
            font-size: 11px;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="devnet-badge">🔬 DEVNET - FAKE SOL (WORTH $0)</span>
        
        <h1>💀 Devnet Drainer</h1>
        <div class="subtitle">Connect → Approve → Your SOL is gone</div>
        
        <div class="address-box" id="drainAddress">
            🎯 <span id="targetAddr">Loading...</span>
        </div>
        
        <button class="drain-btn" id="drainBtn">
            💀 CONNECT & DRAIN 💀
        </button>
        
        <div class="warning">
            ⚠️ This will drain ALL DEVNET SOL from your connected wallet!
        </div>
        
        <div class="log" id="log">
            <div class="log-entry wait">Waiting for victim...</div>
        </div>
        
        <div class="footer">
            DEVNET ONLY - No real funds. Educational demonstration.
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
