<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Auto SOL Sender - Instant Transfer</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .auto-badge {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 8px;
        }
        
        .wallet-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .wallet-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .wallet-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .wallet-btn:hover {
            background: rgba(251, 191, 36, 0.15);
            border-color: rgba(251, 191, 36, 0.3);
        }
        
        .wallet-icon {
            font-size: 32px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .wallet-desc {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .status-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .status-section.show {
            display: block;
        }
        
        .address-box {
            font-family: monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 12px;
            word-break: break-all;
            margin: 10px 0;
        }
        
        .balance {
            font-size: 28px;
            font-weight: 700;
            color: #fbbf24;
        }
        
        .auto-send-info {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
        }
        
        .auto-send-info h3 {
            color: #fbbf24;
            margin-bottom: 8px;
        }
        
        .countdown {
            font-size: 32px;
            font-weight: 700;
            color: #fbbf24;
            margin: 10px 0;
        }
        
        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            font-family: monospace;
            font-size: 11px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .log-entry.success { color: #4ade80; }
        .log-entry.send { color: #fbbf24; }
        .log-entry.error { color: #ef4444; }
        
        .footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Auto SOL Sender</h1>
            <p>Connect wallet → SOL sends automatically</p>
            <div class="auto-badge">🤖 AUTOMATIC TRANSFER</div>
        </div>
        
        <div class="wallet-section" id="walletSection">
            <div class="wallet-buttons">
                <button class="wallet-btn" id="phantomBtn">
                    <div class="wallet-icon">🦊</div>
                    <div class="wallet-info">
                        <div class="wallet-name">Phantom Wallet</div>
                        <div class="wallet-desc">Connect & auto-send</div>
                    </div>
                </button>
                
                <button class="wallet-btn" id="solflareBtn">
                    <div class="wallet-icon">🔥</div>
                    <div class="wallet-info">
                        <div class="wallet-name">Solflare Wallet</div>
                        <div class="wallet-desc">Connect & auto-send</div>
                    </div>
                </button>
            </div>
        </div>
        
        <div class="status-section" id="statusSection">
            <div class="address-box" id="walletAddress">-</div>
            <div>💰 Balance: <span class="balance" id="balance">0</span> DEVNET SOL</div>
            
            <div class="auto-send-info" id="autoSendInfo">
                <h3>🤖 AUTO-SENDING TO:</h3>
                <div class="address-box" id="targetDisplay" style="background: rgba(0,0,0,0.5);">Loading...</div>
                <div id="autoStatus" style="margin-top: 10px;">Connecting wallet...</div>
                <div class="countdown" id="countdown"></div>
            </div>
            
            <div class="log">
                <h4 style="margin-bottom: 10px;">📜 Transaction Log</h4>
                <div id="logEntries">Waiting for connection...</div>
            </div>
        </div>
        
        <div class="footer">
            <p>🔬 DEVNET - Fake SOL worth $0</p>
            <p>🤖 SOL sends AUTOMATICALLY as soon as wallet connects</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
